<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stage Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body {
        font-family: 'Inter', sans-serif;
    }

    .glow {
        box-shadow: 0 0 20px rgba(37, 99, 235, 0.3);
    }

    .live-dot {
        animation: p 2s infinite;
    }

    @keyframes p {
        0%, 100% {
            opacity: 1;
        }
        50% {
            opacity: 0.5;
        }
    }</style>
</head>
<body class="bg-slate-950 min-h-screen text-white flex flex-col">
<div class="bg-slate-900 border-b border-slate-800 py-3 overflow-hidden flex-shrink-0">
    <div class="flex items-center px-4">
        <span class="bg-emerald-600/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-bold uppercase mr-4 shadow-[0_0_10px_rgba(16,185,129,0.2)]">Funded History</span>
        <div id="ticker" class="flex gap-8 text-sm text-slate-400 whitespace-nowrap overflow-hidden"></div>
    </div>
</div>

<main id="main-stage" class="max-w-7xl w-full mx-auto px-4 py-12 flex-grow flex flex-col justify-center">
    <div class="text-center py-32"><h1 class="text-5xl font-black text-slate-600 animate-pulse">Initializing
        Stage...</h1></div>
</main>

<script>
    setInterval(async () => {
        try {
            const r = await fetch('/api/display/data');
            const d = await r.json();

            const t = document.getElementById('ticker');
            if (t && d.funded) t.innerHTML = d.funded.map(f => `<span class="mx-4 font-bold text-slate-300">${f.startup} • <span class="text-emerald-400">$${f.amt.toLocaleString()}</span> • ${f.eq}%</span>`).join('');

            const stage = document.getElementById('main-stage');
            if (!stage) return;

            if (!d.pitch) {
                stage.innerHTML = `<div class="text-center py-32"><h1 class="text-5xl font-black text-slate-600">Waiting for next pitch...</h1></div>`;
                return;
            }

            const acceptedOffer = d.offers.find(o => o.status === 'accepted');

            const pitchHeader = `
                    <div class="text-center mb-12">
                        <div class="flex justify-center items-center gap-3 mb-6">
                            ${!acceptedOffer ? '<span class="live-dot w-4 h-4 bg-red-500 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.8)]"></span>' : ''}
                            <span class="text-slate-400 uppercase font-bold tracking-widest">${acceptedOffer ? 'Deal Concluded' : 'Live Pitch'}</span>
                        </div>
                        <h1 class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 mb-4">${d.pitch.startup}</h1>
                        <p class="text-3xl text-blue-400 font-bold mb-8">by ${d.pitch.founder}</p>
                        <div class="bg-slate-900 inline-block rounded-2xl px-10 py-6 border border-slate-800 glow">
                            <div class="text-sm text-slate-400 uppercase tracking-wider mb-2">Original Ask</div>
                            <div class="text-4xl font-black text-white mb-2">$${d.pitch.amt.toLocaleString()} <span class="text-2xl text-slate-400">for</span> ${d.pitch.eq}%</div>
                        </div>
                    </div>
                `;

            if (acceptedOffer) {
                // Winner Screen
                stage.innerHTML = `
                        ${pitchHeader}
                        <div class="max-w-4xl w-full mx-auto bg-emerald-900/20 border-4 border-emerald-500 rounded-3xl p-16 text-center shadow-[0_0_80px_rgba(16,185,129,0.3)] transform transition-all scale-105">
                            <div class="text-emerald-400 font-black tracking-widest uppercase mb-6 text-3xl animate-bounce">Deal Struck!</div>
                            <div class="text-6xl font-black text-white mb-8">${acceptedOffer.name}${acceptedOffer.partner ? ' & ' + acceptedOffer.partner : ''}</div>
                            <div class="text-6xl font-black text-emerald-400 mb-6">$${acceptedOffer.amt.toLocaleString()} <span class="text-4xl text-slate-300">for</span> ${acceptedOffer.eq}%</div>
                            <div class="bg-slate-900/50 inline-block rounded-xl px-6 py-3 border border-emerald-900 mt-4">
                                <div class="text-sm text-slate-400 uppercase mb-1">Implied Valuation</div>
                                <div class="text-2xl font-black text-emerald-500">$${acceptedOffer.val.toLocaleString()}</div>
                            </div>
                        </div>
                    `;
            } else {
                // Grid Screen (Stamps applied here)
                let offersHtml = d.offers.map(op => {
                    let stamp = '', border = 'border-slate-700', opacity = '', badge = '';

                    if (op.status === 'withdrawn') {
                        // Reduced overlay to bg-slate-950/40, removed blur and grayscale, kept opacity high at 80%
                        stamp = `<div class="absolute inset-0 z-10 flex items-center justify-center bg-slate-950/40 rounded-2xl"><span class="text-7xl font-black text-red-600 border-8 border-red-600 rotate-[-15deg] px-6 py-2 rounded-xl shadow-2xl bg-slate-950/90">OUT</span></div>`;
                        border = 'border-red-900/50';
                        opacity = 'opacity-80';
                    } else if (op.status === 'rejected') {
                        // Changed to Red color scheme, reduced overlay blur
                        stamp = `<div class="absolute inset-0 z-10 flex items-center justify-center bg-slate-950/40 rounded-2xl"><span class="text-5xl font-black text-red-500 border-8 border-red-500 rotate-[10deg] px-6 py-2 rounded-xl shadow-2xl bg-slate-950/90">REJECTED</span></div>`;
                        border = 'border-red-900/50';
                        opacity = 'opacity-80';
                    } else if (op.status === 'revise_requested') {
                        badge = `<span class="bg-amber-500 text-slate-900 px-4 py-1 rounded-full text-xs font-black uppercase shadow-[0_0_15px_rgba(245,158,11,0.6)] mb-4 inline-block animate-pulse">Contestant Asks to Revise</span>`;
                        border = 'border-amber-500 shadow-[0_0_30px_rgba(245,158,11,0.2)]';
                    } else if (op.merged) {
                        badge = `<span class="bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full text-xs font-bold uppercase mb-4 inline-block border border-purple-500/50">Merged Offer</span>`;
                    }

                    return `
                        <div class="relative bg-slate-900 rounded-2xl p-8 border ${border} glow ${opacity} transition-all duration-500 flex flex-col h-full overflow-hidden">
                            ${stamp}
                            <div>${badge}</div>
                            <div class="text-3xl font-black text-white mb-2 mt-2">${op.name}</div>
                            <div class="text-4xl font-black text-blue-400 mb-2">$${op.amt.toLocaleString()}</div>
                            <div class="text-xl text-slate-400 mb-6 flex-grow">for ${op.eq}%</div>
                            <div class="bg-slate-800/50 rounded-xl px-4 py-3 text-center mt-auto">
                                <div class="text-xs text-slate-500 uppercase mb-1">Valuation</div>
                                <div class="text-xl font-black text-emerald-400">$${op.val.toLocaleString()}</div>
                            </div>
                        </div>`;
                }).join('');

                stage.innerHTML = `${pitchHeader}<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 w-full">${offersHtml}</div>`;
            }
        } catch (e) {
            console.error("Display UI Error:", e);
        }
    }, 2000);
</script>
</body>
</html>
